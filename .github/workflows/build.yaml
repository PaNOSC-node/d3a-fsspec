name: CI Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linting:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/karpatkey/pylint310
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Linters
        # Use bash as a work-around, see:
        # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#exit-codes-and-error-action-preference
        shell: bash
        run: |
          set -o pipefail
          STATUS=0
          echo "Linting the script"
          echo "Running Black..."
          black -v --check . || STATUS=1
          echo "Running isort..."
          isort . --check-only || STATUS=1
          echo "Running Flake8..."
          flake8 . || STATUS=1
          exit $STATUS

  unit-testing:
    runs-on: ubuntu-latest
    container:
      image: python:3.11
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests fsspec pytest

      - name: Run unit testing
        run: |
          echo "Running unit testing"
          pytest unit_testing.py
