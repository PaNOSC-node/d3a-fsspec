name: CI Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linting:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/karpatkey/pylint310
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Linters
        # Use bash as a work-around, see:
        # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#exit-codes-and-error-action-preference
        shell: bash
        run: |
          set -o pipefail
          STATUS=0
          echo "Linting the script"
          echo "Running Black..."
          black -v . || STATUS=1
          echo "Running isort..."
          isort . --check-only || STATUS=1
          echo "Running Flake8..."
          flake8 . || STATUS=1
          exit $STATUS

  unit-testing:
    runs-on: ubuntu-latest
    container:
      image: python:3.11
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Installing the package causes setuptools-scm to call git to figure out the current version of the package.
      # This happens after some files were already created by the installation. The call to git then fails as git
      # introspection finds that some files have ownership issues. This setting circumvents that.
      - name: Configure Git safe directory
        run: |
          git config --global --add safe.directory /__w/d3a-fsspec/d3a-fsspec

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run unit testing
        run: |
          echo "Running unit testing"
          python -m unittest

      # Make sure the program starts, then immediately send EOF to shut it down again
      - name: Run the CLI program
        run: |
          : | d3a-cli
